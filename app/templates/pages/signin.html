{% extends "base.html" %}

{% block content %}
<div class="container pt-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <h2 class="mb-3 text-center">Sign in</h2>

      <div class="card p-5" style="min-height: 340px;">
        <form method="post" action="/signin">

          <div class="input-group input-group-lg mb-4 border border-secondary rounded">
            <span class="input-group-text">
              <img
                src="{{ url_for('static', path='icons/user-icon.png') }}"
                alt="user"
                width="18"
                height="18"
              >
            </span>
            <input
              class="form-control shadow-none"
              type="text"
              name="username"
              placeholder="Username"
              required
            />
          </div>

          <div class="input-group input-group-lg mb-4 border border-secondary rounded">
            <span class="input-group-text">
              <img
                src="{{ url_for('static', path='icons/password-icon.png') }}"
                alt="password"
                width="18"
                height="18"
              >
            </span>
            <input
              class="form-control shadow-none"
              type="password"
              name="password"
              placeholder="Password"
              required
            />
          </div>

          <button class="btn btn-dark btn-lg w-100 py-2" type="submit">Sign in</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
